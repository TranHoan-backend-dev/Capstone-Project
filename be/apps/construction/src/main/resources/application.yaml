spring:
  application:
    name: construction
#  profiles:
#    active: dev
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  datasource:
    hikari:
      maximum-pool-size: 5 # nang core khi co nhieu truy van song song
      minimum-idle: 3 # So ket noi idle luon co san
      connection-timeout: 2000 # Cho ket noi toi da 3s
      max-lifetime: 600000 # Ket noi song toi da 30p
      idle-timeout: 30000 # Dong idle sau 30s neu khong su dung
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${POSTGRES_HOST}:5432/${CONSTRUCTION_DATABASE}
    username: postgres
    password: postgres
  rabbitmq:
    host: ${RABBITMQ_HOST} # cua may local
    port: 5672
    username: guest
    password: guest
keycloak:
  server-url: http://${KEYCLOAK_HOST}:8080
  issuer-uri: ${keycloak.server-url}/realms/${keycloak.realms}
  aud:
    - ${KEYCLOAK_AUD}
  realms: ${KEYCLOAK_REALMS}
  username: ${KEYCLOAK_USERNAME}
  password: ${KEYCLOAK_PASSWORD}
  token-uri: ${keycloak.server-url}/realms/${keycloak.realms}/protocol/openid-connect/token
  client-id: ${KEYCLOAK_CLIENT_ID}
management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - info
          - metrics
          - prometheus
      base-path: /actuator
server:
  port: 9004
  servlet:
    context-path: /api/v1
web-frontend-url: ${WEB_FRONTEND_URL:http://localhost:3000}
cors:
  allowed-origins:
    - ${web-frontend-url}
eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST}:9000/eureka
  instance:
    prefer-ip-address: true
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui/index.html
rabbit-mq-config:
  queue_name: construction_queue
  update: update
  delete: delete
  exchange: exchange
  entities:
    - commune
    - hamlet
    - lateral
    - neighborhood-unit
    - road
    - installation-form
  actions:
    - update
    - delete
    - create
    - approve
    - reject
