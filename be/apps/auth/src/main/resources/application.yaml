spring:
  application:
    name: auth
#  profiles:
#    active: dev
  jackson:
    time-zone: Asia/Ho_Chi_Minh
    locale: vi_VN
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  datasource:
    hikari:
      maximum-pool-size: 5 # nang core khi co nhieu truy van song song
      minimum-idle: 3 # So ket noi idle luon co san
      connection-timeout: 2000 # Cho ket noi toi da 3s
      max-lifetime: 600000 # Ket noi song toi da 30p
      idle-timeout: 30000 # Dong idle sau 30s neu khong su dung
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${POSTGRES_HOST}:5432/${AUTH_DATABASE}
    username: postgres
    password: postgres
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${OAUTH2_CLIENT_ID}
            client-secret: ${OAUTH2_CLIENT_SECRET}
            scope:
              - email
              - profile
              - openid
      resourceserver:
        jwt:
          issuer-uri: ${keycloak.issuer-uri}
  rabbitmq:
    host: ${RABBITMQ_HOST} # cua may local
    port: 5672
    username: guest
    password: guest
rabbitmqconfig:
  exchange_name: auth_event_exchange
  queue_name: user_registered_queue
  routing_key: user-created
keycloak:
  server-url: http://${KEYCLOAK_HOST}:8080
  issuer-uri: ${keycloak.server-url}/realms/${keycloak.realms}
  aud:
    - ${KEYCLOAK_AUD}
  realms: ${KEYCLOAK_REALMS}
  username: ${KEYCLOAK_USERNAME}
  password: ${KEYCLOAK_PASSWORD}
  token-uri: ${keycloak.server-url}/realms/${keycloak.realms}/protocol/openid-connect/token
  client-id: ${KEYCLOAK_CLIENT_ID}

  client-secret-admin: ${KEYCLOAK_CLIENT_SECRET_ADMIN}
  client-id-admin: ${KEYCLOAK_CLIENT_ID_ADMIN}
management:
  health:
    rabbit:
      enabled: false
  endpoints:
    web:
      exposure:
        include:
          - health
          - info
          - metrics
          - prometheus
      base-path: /actuator
server:
  port: 9003
  servlet:
    context-path: /api/v1
    encoding:
      charset: UTF-8
      enabled: true
      force: true
      force-request: true
      force-response: true
web-frontend-url: ${WEB_FRONTEND_URL:http://localhost:3000}
cors:
  allowed-origins:
    - ${web-frontend-url}
eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST}:9000/eureka
  instance:
    prefer-ip-address: true
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui/index.html
sending_mail:
  account_creation:
    subject: 'Tạo tài khoản mới'
    template: account-creation
  otp_verification:
    subject: 'Mã xác thực OTP'
    template: 'verify-otp'
