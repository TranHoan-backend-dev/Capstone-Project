spring:
  application:
    name: auth
  profiles:
    active: dev
  jackson:
    time-zone: Asia/Ho_Chi_Minh
    locale: vi_VN
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  datasource:
    hikari:
      maximum-pool-size: 5 # nang core khi co nhieu truy van song song
      minimum-idle: 3 # So ket noi idle luon co san
      connection-timeout: 2000 # Cho ket noi toi da 3s
      max-lifetime: 600000 # Ket noi song toi da 30p
      idle-timeout: 30000 # Dong idle sau 30s neu khong su dung
rabbitmqconfig:
  exchange_name: auth_event_exchange
  queue_name: user_registered_queue
  routing_key: user-created
management:
  health:
    rabbit:
      enabled: false
  endpoints:
    web:
      exposure:
        include:
          - health
          - info
          - metrics
          - prometheus
      base-path: /actuator
server:
  port: 9003
  servlet:
    context-path: /api/v1
    encoding:
      charset: UTF-8
      enabled: true
      force: true
      force-request: true
      force-response: true
web-frontend-url: ${WEB_FRONTEND_URL:http://localhost:3000}
cors:
  allowed-origins:
    - ${web-frontend-url}
eureka:
  client:
    service-url:
      defaultZone: http://localhost:9000/eureka
  instance:
    prefer-ip-address: true
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui/index.html
sending_mail:
  account_creation:
    subject: 'Tạo tài khoản mới'
    template: account-creation
  otp_verification:
    subject: 'Mã xác thực OTP'
    template: 'verify-otp'
  delete_account:
    subject: 'Xóa tài khoản của nhân viên'
    template: account-delete
  update_account:
    subject: 'Cập nhật tài khoản của nhân viên'
    template: account-update
