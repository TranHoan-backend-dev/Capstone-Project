management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - info
          - metrics
          - prometheus
      base-path: /actuator
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui/index.html
eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST}:9000/eureka
  instance:
    prefer-ip-address: true
server:
  port: 9006
  servlet:
    context-path: /api/v1
web-frontend-url: ${WEB_FRONTEND_URL:http://localhost:3000}
cors:
  allowed-origins:
    - ${web-frontend-url}
rabbit-mq-config:
  exchange: exchange
  queue: construction_queue
  entities:
    - material-price
    - meter-type
    - materials-group
    - calculation-unit
    - params
    - water-price
  actions:
    - update
    - delete
