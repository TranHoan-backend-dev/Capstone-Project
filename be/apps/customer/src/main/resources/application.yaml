spring:
  application:
    name: customer
  profiles:
    active: dev
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  datasource:
    hikari:
      maximum-pool-size: 5 # nang core khi co nhieu truy van song song
      minimum-idle: 3 # So ket noi idle luon co san
      connection-timeout: 2000 # Cho ket noi toi da 3s
      max-lifetime: 600000 # Ket noi song toi da 30p
      idle-timeout: 30000 # Dong idle sau 30s neu khong su dung
  #   driver-class-name: org.postgresql.Driver
  #   url: jdbc:postgresql://${POSTGRES_HOST}:5432/${CUSTOMER_DATABASE}
  #   username: ${POSTGRES_USER}
  #   password: ${POSTGRES_PASSWORD}
  # rabbitmq:
  #   host: ${RABBITMQ_HOST} # cua may local
  #   port: 5672
  #   username: guest
  #   password: guest
management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - info
          - metrics
          - prometheus
      base-path: /
eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST}:9000/eureka
  instance:
    prefer-ip-address: true
# keycloak:
