spring:
  application:
    name: notification
  profiles:
    active: dev
  rabbitmq:
    listener:
      simple:
        missing-queues-fatal: false
        auto-startup: true
        retry:
          enabled: true
          initial-interval: 1000
          max-attempts: 999999
          max-interval: 5000
  #   host: ${RABBITMQ_HOST} # cua may local
  #   port: 5672
  #   username: ${RABBITMQ_DEFAULT_USER}
  #   password: ${RABBITMQ_DEFAULT_PASS}
  # data:
  #   mongodb:
  #     uri: mongodb://${MONGODB_USERNAME}:${MONGODB_PASSWORD}@${MONGODB_HOST}:27017/notification?authSource=admin
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  datasource:
    hikari:
      maximum-pool-size: 5 # nang core khi co nhieu truy van song song
      minimum-idle: 3 # So ket noi idle luon co san
      connection-timeout: 2000 # Cho ket noi toi da 3s
      max-lifetime: 600000 # Ket noi song toi da 30p
      idle-timeout: 30000 # Dong idle sau 30s neu khong su dung
management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - info
          - metrics
          - prometheus
      base-path: /actuator
# keycloak:
#   server-url: http://${KEYCLOAK_HOST}:8080
#   issuer-uri: ${keycloak.server-url}/realms/${keycloak.realms}
#   aud:
#     - ${KEYCLOAK_AUD}
#   realms: ${KEYCLOAK_REALMS}
#   username: ${KEYCLOAK_USERNAME}
#   password: ${KEYCLOAK_PASSWORD}
#   token-uri: ${keycloak.server-url}/realms/${keycloak.realms}/protocol/openid-connect/token
#   client-id: ${KEYCLOAK_CLIENT_ID}
server:
  port: 9007
  servlet:
    context-path: /api/v1
web-frontend-url: ${WEB_FRONTEND_URL:http://localhost:3000}
cors:
  allowed-origins:
    - ${web-frontend-url}
eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST}:9000/eureka
  instance:
    prefer-ip-address: true
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui/index.html
rabbit-mq-config:
  update: update
  delete: delete
  exchange: exchange
  queue: construction_queue
  entities:
    - lateral
    - commune
    - neighborhood-unit
    - road
    - hamlet
    - material-price
    - meter-type
    - materials-group
    - calculation-unit
    - params
    - water-price
    - department
    - employee
    - installation-form
  actions:
    - update
    - delete
    - create
    - approve
  auth-routingKey: auth.individual-notification.create
  auth-queue: auth.individual-notification.queue
