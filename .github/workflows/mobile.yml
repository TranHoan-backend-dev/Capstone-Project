name: Mobile Build

on:
  push:
    branches: ["main", "dev", "feat/**", "refactor/**", "style/**", "fix/**"]
    paths:
      - fe/mobile/**
      - .github/workflows/mobile.yml
  pull_request:
    branches: ["dev"]
    paths:
      - fe/mobile/**
      - .github/workflows/mobile.yml

permissions:
  contents: read
  packages: write

jobs:
  android-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      - name: Install Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Install dependencies
        run: npm install
        working-directory: ./fe/mobile/android

      - name: Grant execute permission
        run: chmod +x gradlew
        working-directory: ./fe/mobile/android

      - name: Build Debug APK
        run: ./gradlew assembleDebug
        working-directory: ./fe/mobile/android

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: ./fe/mobile/android/app/build/outputs/apk/debug/app-debug.apk
