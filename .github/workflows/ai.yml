name: AI Service Build

on:
    push:
        branches:
            ["main", "dev", "feat/**", "refactor/**", "style/**", "fix/**"]
        paths:
            - "be/apps/ai-service/**"
            - .github/workflows/ai.yml
    pull_request:
        branches:
            - "dev"
        paths:
            - "be/apps/ai-service/**"
            - .github/workflows/ai.yml

permissions:
    contents: read
    packages: write

jobs:
    python-check:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.10"
                  cache: "pip"
                  cache-dependency-path: "be/apps/ai-service/requirements.txt"

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install flake8 pytest
                  if [ -f be/apps/ai-service/requirements.txt ]; then
                    pip install -r be/apps/ai-service/requirements.txt
                  fi
              working-directory: be/apps/ai-service

            - name: Lint with flake8
              run: |
                  # stop the build if there are Python syntax errors or undefined names
                  flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
                  # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
                  flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
              working-directory: be/apps/ai-service

            - name: Test with pytest
              run: |
                  if [ -d tests ]; then
                    pytest
                  else
                    echo "No tests directory found, skipping pytest."
                  fi
              working-directory: be/apps/ai-service

            - name: Login to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and Push Image
              working-directory: be
              run: |
                  REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
                  IMAGE_NAME="ghcr.io/$REPO_LOWER/ai-service:latest"

                  echo "Building image: $IMAGE_NAME"
                  docker build -t "$IMAGE_NAME" -f apps/ai-service/Dockerfile apps/ai-service

                  echo "Pushing image: $IMAGE_NAME"
                  docker push "$IMAGE_NAME"
